name: DeployGuard CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  validate-backend:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
      # - run: npm run test (Mocked until tests are added)
      
      # SAST Scanning
      - name: Run npm audit
        run: npm audit --audit-level=moderate || true

  validate-frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  docker-build:
    name: Build Containers
    needs: [validate-backend, validate-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Backend Image
        run: |
          docker build -t deployguard-backend:${{ github.sha }} -f ./backend/Dockerfile ./backend
          
      - name: Build Frontend Image
        run: |
          docker build -t deployguard-frontend:${{ github.sha }} -f ./frontend/Dockerfile ./frontend
